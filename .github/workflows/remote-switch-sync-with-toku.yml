name: Remote switch — sync with Toku

on:
  schedule:
    # Every 5 minutes, offset from :00/:30 to reduce GitHub schedule delays.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:

concurrency:
  group: remote-switch-device-jobs
  cancel-in-progress: false

defaults:
  run:
    working-directory: python

jobs:
  sync-with-toku:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync_with_toku
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          GMAIL_OAUTH_CLIENT_B64: ${{ secrets.GMAIL_OAUTH_CLIENT_B64 }}
          GMAIL_TOKEN_B64: ${{ secrets.GMAIL_TOKEN_B64 }}
          TOKU_API_TOKEN: ${{ secrets.TOKU_API_TOKEN }}
        run: python sync_with_toku.py
